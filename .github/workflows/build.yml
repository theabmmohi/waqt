name: Build Android APK
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.0.0)"
        required: true
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: react/package-lock.json
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm ci
      - name: Build web assets
        run: npm run build
      - name: Generate app icons
        run: npx --yes @capacitor/assets generate --android
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Decode keystore
        working-directory: react/android
        run: echo "${{ secrets.BASE64KS }}" | base64 -d > app/release.keystore
      - name: Build release APK
        working-directory: react/android
        env:
          KS_PSWD: ${{ secrets.KS_PSWD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="$KS_PSWD" \
            -Pandroid.injected.signing.key.alias=waqt \
            -Pandroid.injected.signing.key.password="$KS_PSWD"
      - name: Remove keystore
        if: always()
        working-directory: react/android
        run: rm -f app/release.keystore
      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Get commit message
        id: commit
        run: |
          msg=$(git log -1 --pretty=%s)
          echo "message=$msg" >> "$GITHUB_OUTPUT"
      - name: Rename APK to version name
        id: apk
        run: |
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"
          src="android/app/build/outputs/apk/release/app-release.apk"
          out="android/app/build/outputs/apk/release/Waqt-${version}.apk"
          mv "$src" "$out"
          echo "path=react/$out" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.commit.outputs.message }}
          files: ${{ steps.apk.outputs.path }}
      - name: Notify release webhook
        continue-on-error: true
        run: |
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"
          curl -sf -X POST "https://api.abm.ami.bd/webhook/release" \
            -H "Content-Type: application/json" \
            -H "x-release-secret: ${{ secrets.RELEASE_HOOK_SECRET }}" \
            -d "{\"version\": \"$version\"}"
      - name: Prune old releases (keep latest 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
          | while read -r old_tag; do
              echo "Deleting release + tag: $old_tag"
              gh release delete "$old_tag" --yes --cleanup-tag
            done