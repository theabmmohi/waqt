name: Build Android APK
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.0.0)"
        required: true
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: react/package-lock.json
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: npm ci
      - name: Build web assets
        run: npm run build
      - name: Generate app icons
        run: npx --yes @capacitor/assets generate --android
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build debug APK
        working-directory: react/android
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Get commit message
        id: commit
        run: |
          msg=$(git log -1 --pretty=%s)
          echo "message=$msg" >> "$GITHUB_OUTPUT"
      - name: Rename APK to version name
        id: apk
        run: |
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"
          src="android/app/build/outputs/apk/debug/app-debug.apk"
          out="android/app/build/outputs/apk/debug/Waqt(${version}).apk"
          mv "$src" "$out"
          echo "path=react/$out" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body: ${{ steps.commit.outputs.message }}
          files: ${{ steps.apk.outputs.path }}
      - name: Prune old releases (keep latest 5)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
          | while read -r old_tag; do
              echo "Deleting release + tag: $old_tag"
              gh release delete "$old_tag" --yes --cleanup-tag
            done